models:
  Conference:
    name: string
    description: text
    start_date: datetime
    end_date: datetime
    status: string
    region: string
    is_published: boolean default:false
    venue_id: id foreign:venues nullable
    relationships:
      belongsTo: Venue
      belongsToMany: Speaker, Talk

  Venue:
    name: string
    city: string
    country: string
    postal_code: string
    relationships:
      hasMany: Conference

  Speaker:
    name: string
    email: string
    bio: text
    twitter_handle: string
    relationships:
      belongsToMany: Conference

  Talk:
    title: string
    abstract: text
    relationships:
      belongsTo: Speaker
      belongsToMany: Conference
  
